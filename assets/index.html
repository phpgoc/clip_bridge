<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clip Bridge</title>
  <style>
    :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f6f3; color: #1b1f24; }
    main { width: min(520px, calc(100vw - 32px)); }
    .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h1 { font-size: 28px; margin: 0; }
    .github-link {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid #d8dde5;
      border-radius: 6px;
      color: #1b1f24;
      background: #ffffff;
    }
    .github-link:hover { border-color: #1768e5; color: #1768e5; }
    .github-link svg { width: 20px; height: 20px; fill: currentColor; }
    form { display: flex; gap: 8px; }
    input { flex: 1; min-width: 0; padding: 12px; border: 1px solid #bac1cc; border-radius: 6px; font: inherit; }
    button { padding: 0 16px; border: 0; border-radius: 6px; background: #1768e5; color: white; font: inherit; cursor: pointer; }
    p { color: #5d6673; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <h1>Clip Bridge</h1>
      <a class="github-link" href="https://github.com/phpgoc/clip_bridge" target="_blank" rel="noreferrer" aria-label="GitHub repository" title="GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.58.1.79-.25.79-.56v-2.14c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.19-3.08-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.17 1.18A10.93 10.93 0 0 1 12 6.08c.98 0 1.96.13 2.88.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.58.23 2.75.11 3.04.74.8 1.19 1.83 1.19 3.08 0 4.41-2.69 5.38-5.25 5.67.41.35.78 1.05.78 2.12v3.17c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
        </svg>
      </a>
    </div>
    <p>Put a password in the URL. The same URL becomes a P2P clipboard and file room.</p>
    <form id="form">
      <input id="room" autocomplete="off" placeholder="room password">
      <button>Open</button>
    </form>
  </main>
  <script>
    const formEl = document.getElementById('form');
    const roomEl = document.getElementById('room');

    formEl.addEventListener('submit', (event) => {
      event.preventDefault();
      const value = roomEl.value.trim();
      if (value && value !== 'clip_bridge_server') location.href = '/' + encodeURIComponent(value);
    });
  </script>
</body>
</html>
