<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P2P Clip Bridge Server</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f6f3;
      --panel: #ffffff;
      --text: #1b1f24;
      --muted: #5d6673;
      --line: #d8dde5;
      --strong: #1768e5;
      --danger: #b42318;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
    button { font: inherit; }
    .shell { width: min(760px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0 28px; }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }
    .utility-actions,
    .primary-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .utility-actions { justify-self: center; }
    .primary-actions { justify-self: end; }
    .github-link {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel);
    }
    .github-link:hover { border-color: var(--strong); color: var(--strong); }
    .github-link svg { width: 20px; height: 20px; fill: currentColor; }
    .room-count {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      background: var(--panel);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      justify-self: start;
    }
    .room-count::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }
    .room-count.active { border-color: #16a34a; color: #166534; background: #dcfce7; }
    .room-count.active::before { background: #16a34a; }
    .room-count.warn { border-color: #dc2626; color: #991b1b; background: #fee2e2; }
    .room-count.warn::before { background: #dc2626; }
    .help-button {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel);
      cursor: pointer;
      font-weight: 800;
    }
    .help-button:hover { border-color: var(--strong); color: var(--strong); }
    .button {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }
    .button.primary { color: #fff; border-color: var(--strong); background: var(--strong); }
    .button.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 35%, var(--line)); }
    .hint { min-height: 24px; margin: 10px 0 12px; color: var(--muted); font-size: 14px; }
    .hint.error { color: var(--danger); }
    .manual-text-panel {
      display: grid;
      gap: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .manual-text-panel[hidden] { display: none; }
    .manual-text-label { color: var(--muted); font-size: 13px; font-weight: 700; }
    .manual-text-input,
    .received-text {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
      line-height: 1.45;
    }
    .manual-text-input {
      resize: vertical;
    }
    .manual-text-input { min-height: 96px; padding: 10px; }
    .received-text {
      min-height: 76px;
      padding: 10px;
      cursor: text;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      -webkit-user-select: text;
      user-select: text;
      touch-action: pan-y;
    }
    .received-text-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
    }
    .received-text-footer .meta { margin-top: 0; }
    .select-text-button { min-height: 34px; padding: 0 10px; }
    .manual-text-actions { display: flex; justify-content: flex-end; }
    .file-card {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .file-card.show { display: grid; }
    .file-name { overflow-wrap: anywhere; }
    .file-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 6px; color: var(--muted); font-size: 12px; }
    .transport-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-weight: 700;
      color: var(--text);
      background: color-mix(in srgb, var(--panel) 86%, transparent);
    }
    .transport-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .transport-badge.direct { border-color: #16a34a; color: #166534; background: #dcfce7; }
    .transport-badge.direct::before { background: #16a34a; }
    .transport-badge.turn { border-color: #f97316; color: #9a3412; background: #ffedd5; }
    .transport-badge.turn::before { background: #f97316; }
    .transport-badge.checking { border-color: #94a3b8; color: #475569; background: #f1f5f9; }
    .transport-badge.checking::before { background: #94a3b8; }
    .transport-badge.local { border-color: #1768e5; color: #174ea6; background: #dbeafe; }
    .transport-badge.local::before { background: #1768e5; }
    .list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .row {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-height: 56px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
    }
    .row.selected { border-color: var(--strong); box-shadow: inset 0 0 0 1px var(--strong); }
    .select-box {
      width: 24px;
      height: 24px;
      margin: 3px 0 0;
      accent-color: var(--strong);
      cursor: pointer;
    }
    .preview { min-width: 0; }
    .preview-text {
      margin: 0;
      max-height: 72px;
      overflow: hidden;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }
    .meta { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .empty-list {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: color-mix(in srgb, var(--panel) 80%, transparent);
    }
    .hidden { display: none; }
    .help-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: start center;
      padding: 70px 12px 20px;
      background: color-mix(in srgb, var(--bg) 74%, transparent);
      z-index: 10;
    }
    .help-overlay.show { display: grid; }
    .help-panel {
      width: min(460px, 100%);
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 44px rgb(0 0 0 / 18%);
    }
    .help-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .help-title { margin: 0; font-size: 16px; }
    .help-close {
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel);
      cursor: pointer;
    }
    .help-list { margin: 0; padding-left: 20px; color: var(--muted); line-height: 1.55; }
    .help-list strong { color: var(--text); }

    @media (max-width: 560px) {
      .shell { width: min(100vw - 16px, 760px); padding-top: 10px; }
      .topbar { grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
      .utility-actions { justify-self: end; }
      .primary-actions { grid-column: 1 / -1; justify-self: stretch; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .button { flex: 1; }
      .github-link { width: 38px; flex-basis: 38px; }
      .help-button { width: 38px; flex-basis: 38px; }
      .room-count { flex: 0 0 auto; padding: 0 10px; }
      .file-card { grid-template-columns: 1fr; }
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #111418; --panel: #191e24; --text: #eef1f5; --muted: #9ba5b4; --line: #303842; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div id="roomCount" data-testid="room-count" class="room-count">1 in room</div>
      <div class="utility-actions" aria-label="Room tools">
        <button id="helpButton" data-testid="help-open" class="help-button" aria-label="How it works" title="How it works">?</button>
        <a class="github-link" href="https://github.com/phpgoc/clip_bridge" target="_blank" rel="noreferrer" aria-label="GitHub repository" title="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.58.1.79-.25.79-.56v-2.14c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.19-3.08-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.17 1.18A10.93 10.93 0 0 1 12 6.08c.98 0 1.96.13 2.88.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.58.23 2.75.11 3.04.74.8 1.19 1.83 1.19 3.08 0 4.41-2.69 5.38-5.25 5.67.41.35.78 1.05.78 2.12v3.17c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
          </svg>
        </a>
      </div>
      <div class="primary-actions" aria-label="Transfer actions">
        <input id="fileInput" data-testid="file-input" class="hidden" type="file">
        <button id="fileButton" data-testid="file-send" class="button primary">Send File</button>
        <button id="clearButton" data-testid="clear" class="button danger">Clear</button>
      </div>
    </div>

    <div id="toast" data-testid="toast" class="hint"></div>

    <section id="manualTextPanel" data-testid="manual-text-panel" class="manual-text-panel" hidden>
      <label class="manual-text-label" for="manualTextInput">Text to send</label>
      <textarea id="manualTextInput" data-testid="manual-text-input" class="manual-text-input" rows="4" placeholder="Paste text here, then send it to peers already in the room."></textarea>
      <div class="manual-text-actions">
        <button id="manualTextSend" data-testid="manual-text-send" class="button primary">Send Text</button>
      </div>
    </section>

    <section id="fileCard" data-testid="file-card" class="file-card">
      <div>
        <div id="fileName" data-testid="file-name" class="file-name"></div>
        <div id="fileMeta" data-testid="file-meta" class="file-meta"></div>
      </div>
      <button id="downloadButton" data-testid="file-download" class="button primary">Download</button>
    </section>

    <ul id="history" data-testid="history-list" class="list"></ul>
  </main>

  <div id="helpOverlay" data-testid="help-overlay" class="help-overlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
    <div class="help-panel">
      <div class="help-head">
        <h2 id="helpTitle" class="help-title">How this room works</h2>
        <button id="helpClose" data-testid="help-close" class="help-close" aria-label="Close">x</button>
      </div>
      <ul id="helpList" class="help-list"></ul>
    </div>
  </div>

  <script>
    const room = decodeURIComponent(location.pathname.replace(/^\/+/, '')) || 'default';
    const peerId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
    const clearButtonEl = document.getElementById('clearButton');
    const helpButtonEl = document.getElementById('helpButton');
    const helpOverlayEl = document.getElementById('helpOverlay');
    const helpCloseEl = document.getElementById('helpClose');
    const helpListEl = document.getElementById('helpList');
    const roomCountEl = document.getElementById('roomCount');
    const toastEl = document.getElementById('toast');
    const manualTextPanelEl = document.getElementById('manualTextPanel');
    const manualTextInputEl = document.getElementById('manualTextInput');
    const manualTextSendEl = document.getElementById('manualTextSend');
    const historyEl = document.getElementById('history');
    const fileInputEl = document.getElementById('fileInput');
    const fileButtonEl = document.getElementById('fileButton');
    const fileCardEl = document.getElementById('fileCard');
    const fileNameEl = document.getElementById('fileName');
    const fileMetaEl = document.getElementById('fileMeta');
    const downloadButtonEl = document.getElementById('downloadButton');
    let rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    const peers = new Map();
    const roomPeers = new Set();
    const seenMessages = new Set();
    const outboundFiles = new Map();
    const inboundFiles = new Map();
    let currentFileOffer = null;
    let selected = null;
    let historyItems = [];
    let sequence = 0;
    let signalSocket = null;
    // EN: Clipboard read/write requires a secure browser context (HTTPS or localhost).
    // CN: 浏览器剪贴板读写需要安全上下文（HTTPS 或 localhost）；nginx 反代时以浏览器地址栏协议为准。
    const forceManualClipboardMode = Boolean(window.__forceManualClipboardMode);
    const canUseSystemClipboard = !forceManualClipboardMode && window.isSecureContext && Boolean(navigator.clipboard?.readText) && Boolean(navigator.clipboard?.writeText);

    window.__serverClipboard = {
      peerId: () => peerId,
      peerCount: () => openChannels().length,
      roomCount: () => roomPeers.size + 1,
      historyCount: () => historyItems.length,
      currentFileName: () => currentFileOffer?.name || '',
      canUseSystemClipboard: () => canUseSystemClipboard,
    };

    function setToast(message, isError = false) {
      toastEl.textContent = message;
      toastEl.classList.toggle('error', isError);
    }

    function formatTime(seconds) {
      if (!seconds) return '';
      return new Date(seconds * 1000).toLocaleString();
    }

    function formatBytes(size) {
      if (size < 1024) return size + ' B';
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + ' KB';
      return (size / 1024 / 1024).toFixed(1) + ' MB';
    }

    function renderRoomCount() {
      const count = roomPeers.size + 1;
      roomCountEl.textContent = `${count} in room`;
      roomCountEl.className = 'room-count';
      if (count === 2) roomCountEl.classList.add('active');
      if (count > 2) roomCountEl.classList.add('warn');
      roomCountEl.title = count > 2
        ? 'More than two peers are in this room'
        : 'Current peers in this room';
    }

    function render() {
      historyEl.innerHTML = '';

      if (!historyItems.length) {
        const empty = document.createElement('li');
        empty.className = 'empty-list';
        empty.dataset.testid = 'empty-history';
        empty.textContent = 'No clipboard items yet';
        historyEl.appendChild(empty);
        return;
      }

      for (const item of historyItems) {
        const li = document.createElement('li');
        li.className = 'row';
        li.dataset.testid = 'history-row';
        li.dataset.itemId = item.id;
        if (selected?.id === item.id) li.classList.add('selected');

        const input = document.createElement('input');
        input.className = 'select-box';
        input.type = 'radio';
        input.name = 'selected_clipboard_item';
        input.checked = selected?.id === item.id;
        input.dataset.testid = 'history-select';
        input.dataset.historyId = item.id;

        const preview = document.createElement('div');
        preview.className = 'preview';
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `#${item.version} - ${formatTime(item.createdAt)}`;
        if (canUseSystemClipboard) {
          const text = document.createElement('p');
          text.className = 'preview-text';
          text.textContent = item.text;
          preview.append(text, meta);
          li.addEventListener('click', () => copyHistoryItem(item));
        } else {
          li.classList.add('manual');
          const text = document.createElement('div');
          text.className = 'received-text';
          text.textContent = item.text;
          text.tabIndex = 0;
          text.setAttribute('role', 'textbox');
          text.setAttribute('aria-readonly', 'true');
          text.setAttribute('aria-label', 'Received text');
          text.dataset.testid = 'history-text';
          text.addEventListener('click', (event) => event.stopPropagation());

          const selectButton = document.createElement('button');
          selectButton.className = 'button select-text-button';
          selectButton.type = 'button';
          selectButton.textContent = 'Select all';
          selectButton.dataset.testid = 'history-select-all';
          selectButton.addEventListener('click', () => selectHistoryText(text, item));

          const footer = document.createElement('div');
          footer.className = 'received-text-footer';
          footer.append(meta, selectButton);
          preview.append(text, footer);
        }

        li.append(input, preview);
        historyEl.appendChild(li);
      }
    }

    function helpItem(title, body) {
      const li = document.createElement('li');
      const strong = document.createElement('strong');
      strong.textContent = title;
      li.append(strong, document.createTextNode(` ${body}`));
      return li;
    }

    function renderHelp() {
      const items = canUseSystemClipboard
        ? [
            ['Use a complex room password.', 'Anyone with this URL can join the room, so avoid short or guessable names.'],
            ['WebRTC carries the content.', 'Text and file bytes move through WebRTC DataChannels; the server only handles signaling and optional TURN relay, and does not store content.'],
            ['Click blank space.', 'This reads this device clipboard and sends changes immediately to peers already in the room.'],
            ['Click a list row.', 'This copies that text into this device clipboard.'],
            ['Clipboard clicks are fast.', 'This page favors speed, so blank-space clipboard actions are easy to trigger by mistake.'],
            ['Send File.', 'The file name and size are offered first. Bytes move only after another peer clicks Download.'],
            ['Watch the room count.', 'Send only after the expected peers are connected.'],
            ['Late peers see nothing.', 'Peers joining later do not receive earlier text or file offers.'],
          ]
        : [
            ['Manual text mode.', 'Plain HTTP outside localhost cannot use browser clipboard permissions, so paste text into the box and click Send Text.'],
            ['Replace by paste.', 'The send box selects its current text when focused or after sending, so the next paste replaces it.'],
            ['Copy received text.', 'Long-press the text to select part of it, or use Select all before copying.'],
            ['Send File.', 'The file name and size are offered first. Bytes move only after another peer clicks Download.'],
            ['Connected peers only.', 'Text and file offers go only to peers connected at send time; later peers do not receive earlier data.'],
          ];
      helpListEl.replaceChildren(...items.map(([title, body]) => helpItem(title, body)));
    }

    function renderClipboardMode() {
      manualTextPanelEl.hidden = canUseSystemClipboard;
      renderHelp();
      if (canUseSystemClipboard) return;
      setToast('Clipboard permission needs HTTPS or localhost. Use the text box for manual send and copy.');
    }

    function renderFileOffer() {
      fileCardEl.classList.toggle('show', Boolean(currentFileOffer));
      if (!currentFileOffer) return;
      fileNameEl.textContent = currentFileOffer.name;
      const transport = currentFileOffer.peerId === peerId
        ? { label: 'local sender', kind: 'local' }
        : transportInfo(currentFileOffer.peerId);
      fileMetaEl.replaceChildren(
        document.createTextNode(`${formatBytes(currentFileOffer.size)} - ${currentFileOffer.status || 'ready to download'} - `),
        transportBadge(transport),
      );
      downloadButtonEl.disabled = currentFileOffer.status === 'transferring';
      downloadButtonEl.textContent = currentFileOffer.status === 'transferring' ? 'Transferring' : 'Download';
    }

    function transportInfo(remoteId) {
      const transport = peers.get(remoteId)?.transport;
      if (transport === 'turn') return { label: 'TURN relay', kind: 'turn' };
      if (transport === 'direct') return { label: 'direct', kind: 'direct' };
      return { label: 'checking connection', kind: 'checking' };
    }

    function transportBadge(transport) {
      const badge = document.createElement('span');
      badge.className = `transport-badge ${transport.kind}`;
      badge.dataset.testid = 'transport-badge';
      badge.textContent = transport.label;
      return badge;
    }

    function addItem(text, messageId = `${peerId}-${Date.now()}-${Math.random()}`) {
      if (!text || seenMessages.has(messageId)) return false;
      seenMessages.add(messageId);
      sequence += 1;
      const item = {
        id: messageId,
        text,
        version: sequence,
        createdAt: Math.floor(Date.now() / 1000),
      };
      historyItems.push(item);
      historyItems = historyItems.slice(-50);
      selected = item;
      render();
      return true;
    }

    async function copyHistoryItem(item) {
      selected = item;
      render();
      try {
        await navigator.clipboard.writeText(item.text);
        setToast('Copied to local clipboard');
      } catch (err) {
        setToast(err.message || 'Copy failed', true);
      }
    }

    function markSelectedItem(item) {
      selected = item;
      for (const row of historyEl.querySelectorAll('.row')) row.classList.toggle('selected', row.dataset.itemId === item.id);
      for (const input of historyEl.querySelectorAll('[data-history-id]')) input.checked = input.dataset.historyId === item.id;
    }

    function selectHistoryText(text, item) {
      markSelectedItem(item);
      text.focus({ preventScroll: true });
      const selection = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(text);
      selection.removeAllRanges();
      selection.addRange(range);
      setToast('Text selected. Copy it manually.');
    }

    function selectManualTextInput() {
      if (!manualTextInputEl.value) return;
      manualTextInputEl.focus();
      manualTextInputEl.setSelectionRange(0, manualTextInputEl.value.length);
    }

    function replaceManualTextOnPaste(event) {
      const text = event.clipboardData?.getData('text/plain');
      if (text === undefined || !manualTextInputEl.value) return;
      event.preventDefault();
      manualTextInputEl.value = text;
      selectManualTextInput();
    }

    function clearLocal() {
      selected = null;
      historyItems = [];
      seenMessages.clear();
      currentFileOffer = null;
      inboundFiles.clear();
      render();
      renderFileOffer();
    }

    function connectSignaling() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      signalSocket = new WebSocket(`${protocol}//${location.host}/clip_bridge_server`);

      signalSocket.onopen = () => {
        sendSignal({ kind: 'join', room, peer_id: peerId });
      };
      signalSocket.onmessage = async (event) => {
        const message = JSON.parse(event.data);
        if (message.kind === 'peers') {
          roomPeers.clear();
          for (const remoteId of message.peers) roomPeers.add(remoteId);
          renderRoomCount();
          for (const remoteId of message.peers) await createPeer(remoteId, true);
        }
        if (message.kind === 'peer_joined') {
          roomPeers.add(message.peer_id);
          renderRoomCount();
        }
        if (message.kind === 'peer_left') {
          roomPeers.delete(message.peer_id);
          renderRoomCount();
          closePeer(message.peer_id);
        }
        if (message.kind === 'signal') await handleSignal(message.from, message.data);
      };
      signalSocket.onclose = () => {
        roomPeers.clear();
        renderRoomCount();
        for (const remoteId of peers.keys()) closePeer(remoteId);
        setTimeout(connectSignaling, 1200);
      };
    }

    async function loadServerConfig() {
      try {
        const res = await fetch('/clip_bridge_server/config', { cache: 'no-store' });
        if (!res.ok) return;
        const config = await res.json();
        if (Array.isArray(config.iceServers) && config.iceServers.length) {
          rtcConfig = { iceServers: config.iceServers };
        }
      } catch (_) {
      }
    }

    function sendSignal(message) {
      if (signalSocket?.readyState === WebSocket.OPEN) {
        signalSocket.send(JSON.stringify(message));
      }
    }

    function openChannels() {
      return Array.from(peers.values())
        .map((peer) => peer.channel)
        .filter((channel) => channel?.readyState === 'open');
    }

    function channelFor(remoteId) {
      const channel = peers.get(remoteId)?.channel;
      return channel?.readyState === 'open' ? channel : null;
    }

    async function createPeer(remoteId, initiator) {
      if (peers.has(remoteId)) return peers.get(remoteId);

      const pc = new RTCPeerConnection(rtcConfig);
      const peer = { pc, channel: null, pendingCandidates: [], transport: 'checking' };
      peers.set(remoteId, peer);

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          sendSignal({
            kind: 'signal',
            to: remoteId,
            data: { type: 'ice', candidate: event.candidate },
          });
        }
      };
      pc.onconnectionstatechange = () => {
        document.body.dataset.peerCount = String(openChannels().length);
        if (['connected', 'completed'].includes(pc.connectionState)) refreshTransport(remoteId);
        if (['closed', 'disconnected', 'failed'].includes(pc.connectionState)) closePeer(remoteId);
      };
      pc.ondatachannel = (event) => wireChannel(remoteId, event.channel);

      if (initiator) {
        wireChannel(remoteId, pc.createDataChannel('clipboard'));
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal({
          kind: 'signal',
          to: remoteId,
          data: { type: 'offer', description: pc.localDescription },
        });
      }

      return peer;
    }

    function wireChannel(remoteId, channel) {
      const peer = peers.get(remoteId);
      if (!peer) return;
      peer.channel = channel;
      channel.onopen = () => {
        document.body.dataset.peerCount = String(openChannels().length);
        refreshTransport(remoteId);
      };
      channel.onclose = () => {
        document.body.dataset.peerCount = String(openChannels().length);
      };
      channel.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.kind === 'clipboard_text' && addItem(message.text, message.id) && !canUseSystemClipboard) {
          setToast('Text received. Long-press it to select, or use Select all.');
        }
        if (message.kind === 'file_offer') receiveFileOffer(remoteId, message);
        if (message.kind === 'file_request') sendFile(remoteId, message.id);
        if (message.kind === 'file_start') receiveFileStart(remoteId, message);
        if (message.kind === 'file_chunk') receiveFileChunk(message);
        if (message.kind === 'file_end') receiveFileEnd(message.id);
      };
    }

    async function handleSignal(remoteId, data) {
      const peer = await createPeer(remoteId, false);

      if (data.type === 'offer') {
        await peer.pc.setRemoteDescription(data.description);
        const answer = await peer.pc.createAnswer();
        await peer.pc.setLocalDescription(answer);
        sendSignal({
          kind: 'signal',
          to: remoteId,
          data: { type: 'answer', description: peer.pc.localDescription },
        });
        await flushCandidates(peer);
      }

      if (data.type === 'answer') {
        await peer.pc.setRemoteDescription(data.description);
        await flushCandidates(peer);
      }

      if (data.type === 'ice') {
        if (peer.pc.remoteDescription) {
          await peer.pc.addIceCandidate(data.candidate);
        } else {
          peer.pendingCandidates.push(data.candidate);
        }
      }
    }

    async function flushCandidates(peer) {
      while (peer.pendingCandidates.length) {
        await peer.pc.addIceCandidate(peer.pendingCandidates.shift());
      }
    }

    function closePeer(remoteId) {
      const peer = peers.get(remoteId);
      if (!peer) return;
      peer.channel?.close();
      peer.pc.close();
      peers.delete(remoteId);
      document.body.dataset.peerCount = String(openChannels().length);
    }

    async function refreshTransport(remoteId) {
      const peer = peers.get(remoteId);
      if (!peer) return;
      try {
        const stats = await peer.pc.getStats();
        const pair = selectedCandidatePair(stats);
        if (!pair) return;
        const local = stats.get(pair.localCandidateId);
        const remote = stats.get(pair.remoteCandidateId);
        peer.transport = [local?.candidateType, remote?.candidateType].includes('relay') ? 'turn' : 'direct';
        if (currentFileOffer?.peerId === remoteId) renderFileOffer();
      } catch (_) {
      }
    }

    function selectedCandidatePair(stats) {
      let transportPairId = null;
      for (const report of stats.values()) {
        if (report.type === 'transport' && report.selectedCandidatePairId) {
          transportPairId = report.selectedCandidatePairId;
          break;
        }
      }
      if (transportPairId && stats.get(transportPairId)) return stats.get(transportPairId);

      for (const report of stats.values()) {
        if (report.type === 'candidate-pair' && report.state === 'succeeded' && (report.nominated || report.selected)) {
          return report;
        }
      }
      return null;
    }

    function broadcast(message) {
      const body = JSON.stringify(message);
      for (const channel of openChannels()) channel.send(body);
    }

    function clearLocalHistory() {
      clearLocal();
      setToast('Cleared locally');
    }

    function sendTextToPeers(text, emptyMessage) {
      if (!text) {
        setToast(emptyMessage, true);
        return false;
      }
      if (historyItems.at(-1)?.text === text) {
        setToast('No clipboard changes');
        return false;
      }

      const id = `${peerId}-${Date.now()}-${Math.random()}`;
      addItem(text, id);
      broadcast({ kind: 'clipboard_text', id, text });
      setToast(openChannels().length ? 'Sent via P2P' : 'Saved locally; no connected peers received it');
      return true;
    }

    function sendManualText() {
      if (sendTextToPeers(manualTextInputEl.value, 'Text is empty')) selectManualTextInput();
    }

    async function clickClipboard() {
      try {
        if (!canUseSystemClipboard) {
          setToast('Clipboard is unavailable. Use HTTPS or localhost.', true);
          return;
        }

        const clip = await navigator.clipboard.readText();
        sendTextToPeers(clip, 'Local clipboard is empty');
      } catch (err) {
        setToast(err.message || 'Clipboard action failed', true);
      }
    }

    function chooseFile() {
      fileInputEl.click();
    }

    function offerSelectedFile() {
      const file = fileInputEl.files?.[0];
      if (!file) return;
      const id = `${peerId}-file-${Date.now()}-${Math.random()}`;
      outboundFiles.set(id, file);
      currentFileOffer = {
        id,
        peerId,
        name: file.name,
        size: file.size,
        type: file.type || 'application/octet-stream',
        status: openChannels().length ? 'ready to download' : 'not sent - no peers',
      };
      renderFileOffer();
      broadcast({
        kind: 'file_offer',
        id,
        name: file.name,
        size: file.size,
        type: file.type || 'application/octet-stream',
      });
      setToast(openChannels().length ? 'File is ready to send' : 'File selected locally; no connected peers received the offer');
    }

    function receiveFileOffer(remoteId, message) {
      currentFileOffer = {
        id: message.id,
        peerId: remoteId,
        name: message.name,
        size: message.size,
        type: message.type || 'application/octet-stream',
        status: 'ready to download',
      };
      renderFileOffer();
      setToast('File received. Click Download to fetch it.');
    }

    function requestCurrentFile() {
      if (!currentFileOffer) return;
      if (currentFileOffer.peerId === peerId) {
        setToast('This file is waiting to be sent from this device');
        return;
      }
      const channel = channelFor(currentFileOffer.peerId);
      if (!channel) {
        setToast('Sender is offline', true);
        return;
      }
      currentFileOffer.status = 'transferring';
      renderFileOffer();
      channel.send(JSON.stringify({ kind: 'file_request', id: currentFileOffer.id }));
    }

    async function sendFile(remoteId, fileId) {
      const file = outboundFiles.get(fileId);
      const channel = channelFor(remoteId);
      if (!file || !channel) return;

      const chunkSize = 12 * 1024;
      const totalChunks = Math.ceil(file.size / chunkSize);
      channel.send(JSON.stringify({
        kind: 'file_start',
        id: fileId,
        name: file.name,
        size: file.size,
        type: file.type || 'application/octet-stream',
        totalChunks,
      }));

      for (let index = 0; index < totalChunks; index += 1) {
        const start = index * chunkSize;
        const chunk = await file.slice(start, start + chunkSize).arrayBuffer();
        channel.send(JSON.stringify({
          kind: 'file_chunk',
          id: fileId,
          index,
          data: arrayBufferToBase64(chunk),
        }));
        await waitForBufferedAmount(channel);
      }

      channel.send(JSON.stringify({ kind: 'file_end', id: fileId }));
      setToast('File sent');
    }

    function receiveFileStart(remoteId, message) {
      inboundFiles.set(message.id, {
        peerId: remoteId,
        name: message.name,
        size: message.size,
        type: message.type || 'application/octet-stream',
        totalChunks: message.totalChunks,
        chunks: new Array(message.totalChunks),
        received: 0,
      });
      currentFileOffer = {
        id: message.id,
        peerId: remoteId,
        name: message.name,
        size: message.size,
        type: message.type || 'application/octet-stream',
        status: 'transferring',
      };
      renderFileOffer();
    }

    function receiveFileChunk(message) {
      const transfer = inboundFiles.get(message.id);
      if (!transfer || transfer.chunks[message.index]) return;
      const bytes = base64ToBytes(message.data);
      transfer.chunks[message.index] = bytes;
      transfer.received += bytes.byteLength;
      if (currentFileOffer?.id === message.id) {
        currentFileOffer.status = `${Math.round((transfer.received / transfer.size) * 100)}%`;
        renderFileOffer();
      }
    }

    function receiveFileEnd(fileId) {
      const transfer = inboundFiles.get(fileId);
      if (!transfer) return;
      const blob = new Blob(transfer.chunks, { type: transfer.type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = transfer.name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      inboundFiles.delete(fileId);
      if (currentFileOffer?.id === fileId) {
        currentFileOffer.status = 'done';
        renderFileOffer();
      }
      setToast('File downloaded');
    }

    function arrayBufferToBase64(buffer) {
      let binary = '';
      const bytes = new Uint8Array(buffer);
      for (let i = 0; i < bytes.length; i += 1) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function waitForBufferedAmount(channel) {
      while (channel.bufferedAmount > 512 * 1024) {
        await new Promise((resolve) => setTimeout(resolve, 20));
      }
    }

    function isBlankClickTarget(target) {
      return !target.closest('button, input, textarea, a, label, .row, .file-card, .help-panel, .help-overlay');
    }

    function openHelp() {
      helpOverlayEl.classList.add('show');
    }

    function closeHelp() {
      helpOverlayEl.classList.remove('show');
    }

    window.addEventListener('click', (event) => {
      if (canUseSystemClipboard && event.button === 0 && isBlankClickTarget(event.target)) clickClipboard();
    });
    helpButtonEl.addEventListener('click', openHelp);
    helpCloseEl.addEventListener('click', closeHelp);
    helpOverlayEl.addEventListener('click', (event) => {
      if (event.target === helpOverlayEl) closeHelp();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeHelp();
    });
    clearButtonEl.addEventListener('click', clearLocalHistory);
    manualTextSendEl.addEventListener('click', sendManualText);
    manualTextInputEl.addEventListener('focus', selectManualTextInput);
    manualTextInputEl.addEventListener('mouseup', (event) => {
      if (!manualTextInputEl.value) return;
      event.preventDefault();
      selectManualTextInput();
    });
    manualTextInputEl.addEventListener('paste', replaceManualTextOnPaste);
    fileButtonEl.addEventListener('click', chooseFile);
    fileInputEl.addEventListener('change', offerSelectedFile);
    downloadButtonEl.addEventListener('click', requestCurrentFile);

    async function start() {
      renderRoomCount();
      renderClipboardMode();
      render();
      renderFileOffer();
      await loadServerConfig();
      connectSignaling();
    }

    start();
  </script>
</body>
</html>
